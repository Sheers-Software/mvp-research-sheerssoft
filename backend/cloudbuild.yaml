substitutions:
  _REGION: asia-southeast1
  _REPO: nocturn-ai
  _BACKEND_SERVICE: nocturn-backend
  _FRONTEND_SERVICE: nocturn-frontend
  _SA: nocturn-cloud-run@nocturn-ai-487207.iam.gserviceaccount.com

steps:
  # ── 1. Build backend image ───────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - ./backend

  # ── 2. Build frontend image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_URL', 'SUPABASE_ANON_KEY']
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=https://nocturn-backend-343745766874.asia-southeast1.run.app \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=$$SUPABASE_URL \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest \
          ./frontend

  # ── 3. Push backend image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend

  # ── 4. Push frontend image ───────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend

  # ── 5. Deploy backend to Cloud Run ──────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --cpu=1
      - --memory=1Gi
      - --timeout=300
      - --cpu-throttling
      - --set-env-vars=ENVIRONMENT=production,FRONTEND_URL=https://nocturn-frontend-343745766874.asia-southeast1.run.app,SUPERADMIN_EMAILS=a.basyir@sheerssoft.com,ALLOWED_ORIGINS=https://nocturn-frontend-343745766874.asia-southeast1.run.app,PROJECT_ID=$PROJECT_ID
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,JWT_SECRET=JWT_SECRET:latest,STRIPE_API_KEY=STRIPE_API_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest,WHATSAPP_PHONE_NUMBER_ID=WHATSAPP_PHONE_NUMBER_ID:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest,FERNET_ENCRYPTION_KEY=FERNET_ENCRYPTION_KEY:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,INTERNAL_SCHEDULER_SECRET=INTERNAL_SCHEDULER_SECRET:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest
      - --allow-unauthenticated
      - --port=8080

  # ── 6. Deploy frontend to Cloud Run ─────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend, deploy-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --min-instances=0
      - --max-instances=3
      - --concurrency=100
      - --cpu=1
      - --memory=512Mi
      - --timeout=60
      - --cpu-throttling
      - --set-env-vars=NEXT_PUBLIC_API_URL=https://nocturn-backend-343745766874.asia-southeast1.run.app
      - --allow-unauthenticated
      - --port=3000

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
 
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'
