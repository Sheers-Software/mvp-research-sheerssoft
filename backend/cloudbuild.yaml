substitutions:
  _REGION: asia-southeast1
  _REPO: nocturn-ai
  _BACKEND_SERVICE: nocturn-backend
  _FRONTEND_SERVICE: nocturn-frontend
  _SA: nocturn-cloud-run@nocturn-ai-487207.iam.gserviceaccount.com

steps:
  # ── 1. Build backend image ───────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - ./backend

  # ── 2. Build frontend image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://nocturn-backend-343745766874.asia-southeast1.run.app
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=https://ramenghkpvipxijhfptp.supabase.co
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbWVuZ2hrcHZpcHhpamhmcHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTg5MzAsImV4cCI6MjA4Nzk5NDkzMH0.DmskI__M8XyXKwkhgrYFsBwgDyUY7GeiMHOwlEWhAQw
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest
      - ./frontend

  # ── 3. Push backend image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend

  # ── 4. Push frontend image ───────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend

  # ── 5. Deploy backend to Cloud Run ──────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --cpu=1
      - --memory=1Gi
      - --timeout=300
      - --cpu-throttling
      - --set-env-vars=ENVIRONMENT=production,FRONTEND_URL=https://nocturn-frontend-343745766874.asia-southeast1.run.app,SUPERADMIN_EMAILS=a.basyir@sheerssoft.com
      - --allow-unauthenticated
      - --port=8080

  # ── 6. Deploy frontend to Cloud Run ─────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend, deploy-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --min-instances=0
      - --max-instances=3
      - --concurrency=100
      - --cpu=1
      - --memory=512Mi
      - --timeout=60
      - --cpu-throttling
      - --set-env-vars=NEXT_PUBLIC_API_URL=https://nocturn-backend-343745766874.asia-southeast1.run.app
      - --allow-unauthenticated
      - --port=3000

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
