# ═══════════════════════════════════════════════════════════
# NOCTURN AI — Demo Stack
# Database is Supabase — DATABASE_URL loaded from GCP Secret Manager.
# Usage: docker-compose -f docker-compose.demo.yml up -d
# Then:  python scripts/seed_demo.py
# ═══════════════════════════════════════════════════════════

services:
  demo-redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  demo-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env.demo
    environment:
      # DATABASE_URL and all API secrets are fetched from GCP Secret Manager at startup.
      # No secrets are sourced from .env.demo — only non-secret config lives there.
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/credentials.json
      BAILEYS_BRIDGE_URL: http://demo-baileys-bridge:3001
    ports:
      - "8001:8080"
    depends_on:
      demo-redis:
        condition: service_healthy
    volumes:
      - ./backend/static:/app/static
      # Mount GCP Application Default Credentials for local development.
      # Run `gcloud auth application-default login` on the host first.
      # On GCP deployments this volume is unused — workload identity takes precedence.
      # Windows (Git Bash / WSL2): $APPDATA resolves to C:\Users\<user>\AppData\Roaming
      - ${GOOGLE_APPLICATION_CREDENTIALS:-$APPDATA/gcloud/application_default_credentials.json}:/gcp/credentials.json:ro

  demo-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3001:3000"
    depends_on:
      - demo-backend

  demo-baileys-bridge:
    build:
      context: ./baileys-bridge
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3002:3001"
    environment:
      BACKEND_INTERNAL_URL: http://demo-backend:8080
      INTERNAL_SECRET: ${DEMO_INTERNAL_SECRET:-}
      PORT: "3001"
    volumes:
      - demo_baileys_sessions:/sessions
      - ${GOOGLE_APPLICATION_CREDENTIALS:-C:/Users/abasy/AppData/Roaming/gcloud/application_default_credentials.json}:/gcp/credentials.json:ro
    depends_on:
      - demo-backend

volumes:
  demo_baileys_sessions:
