version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # All secrets (DATABASE_URL, API keys, JWT, etc.) are fetched from GCP Secret Manager
      # at startup via config.py. No secrets are sourced from local env files.
      #
      # Authentication for Secret Manager:
      #   - GCP (Cloud Run / GCE): workload identity / attached service account (automatic)
      #   - Local Docker (Windows): GOOGLE_APPLICATION_CREDENTIALS_PATH defaults to
      #     %APPDATA%/gcloud/application_default_credentials.json
      #     Run `gcloud auth application-default login` on the host first.
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/credentials.json
    volumes:
      # Mount GCP Application Default Credentials for local development.
      # On GCP deployments this volume is unused — workload identity takes precedence.
      # Windows (Git Bash / WSL2): $APPDATA resolves to C:\Users\<user>\AppData\Roaming
      - ${GOOGLE_APPLICATION_CREDENTIALS_PATH:-$APPDATA/gcloud/application_default_credentials.json}:/gcp/credentials.json:ro
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked in at build time by Next.js.
        # Anon key is intentionally public (safe in source/build args).
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_SUPABASE_URL: https://ramenghkpvipxijhfptp.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbWVuZ2hrcHZpcHhpamhmcHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTg5MzAsImV4cCI6MjA4Nzk5NDkzMH0.DmskI__M8XyXKwkhgrYFsBwgDyUY7GeiMHOwlEWhAQw
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started
